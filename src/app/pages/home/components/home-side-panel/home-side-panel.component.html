<aside class="panel" id="nuevos">
  <section>
    <h3 class="panel-title">Tendencias de la Semana</h3>

    <!-- Skeleton de carga -->
    <ul *ngIf="cargando" class="skeleton-list">
      <li class="skeleton-item" *ngFor="let i of [1,2,3]">
        <div class="skeleton-img"></div>
        <div class="skeleton-text">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </li>
    </ul>

    <!-- Lista real de nuevos lanzamientos -->
    <ul *ngIf="!cargando && nuevosLanzamientos.length > 0">
      <li *ngFor="let libro of nuevosLanzamientos; let i = index" [routerLink]="['/libro', libro.id]">
        <!-- Portada real o placeholder virtual -->
        <div class="portada-mini"
             [style.background]="libro.portadaUrl ? 'none' : obtenerColorPortada(i)">
          <img
            *ngIf="libro.portadaUrl"
            [src]="libro.portadaUrl"
            [alt]="'Portada ' + libro.titulo"
            class="portada-img"
          />
          <span *ngIf="!libro.portadaUrl" class="portada-inicial">
            {{ libro.titulo?.charAt(0)?.toUpperCase() }}
          </span>
        </div>

        <!-- Info -->
        <div class="libro-mini-info">
          <span class="libro-mini-titulo">{{ libro.titulo }}</span>
          <span class="libro-mini-autor">{{ libro.autorNombre || 'Autor desconocido' }}</span>
        </div>
      </li>
    </ul>

    <!-- Sin datos -->
    <p class="sin-datos" *ngIf="!cargando && nuevosLanzamientos.length === 0">
      No hay novedades disponibles.
    </p>
  </section>

  <section>
    <h3>Tu progreso</h3>
    <div class="progress-card">
      <p>8 libros iniciados</p>
      <p>3 libros completados</p>
      <div class="bar"><span></span></div>
    </div>
  </section>
</aside>
