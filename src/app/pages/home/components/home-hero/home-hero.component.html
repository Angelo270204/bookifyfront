<section class="hero" id="destacados" *ngIf="!cargando && featuredBook">
  <div class="info">
    <p class="eyebrow">Destacado del Día</p>
    <h1>{{ featuredBook.titulo }}</h1>
    <p class="author">Por {{ featuredBook.autorNombre || featuredBook.autor?.nombre || 'Desconocido' }}</p>
    <p class="description">
      {{ featuredBook.descripcion || 'Sin descripción' }}
    </p>
    <button type="button" [routerLink]="['/libro', featuredBook.id]">Ver detalles</button>
  </div>
  <div class="cover" [style.backgroundImage]="'url(' + getCoverUrl() + ')'" aria-hidden="true"></div>
</section>

<!-- Placeholder de carga opcional -->
<section class="hero" *ngIf="cargando">
  <div class="info" style="opacity: 0.5;">
    <p class="eyebrow">Cargando...</p>
    <h1>Buscando libro destacado</h1>
  </div>
</section>
