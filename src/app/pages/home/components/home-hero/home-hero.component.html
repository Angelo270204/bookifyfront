<section class="hero" id="destacados">
  <div class="info">
    <p class="eyebrow">Libro destacado</p>
    <h1>{{ featured.title }}</h1>
    <p class="author">{{ featured.author }}</p>
    <p class="description">{{ featured.description }}</p>
    <button type="button">Ver detalles</button>
  </div>
  <div class="cover" [style.backgroundImage]="'url(' + featured.coverUrl + ')'" aria-hidden="true"></div>
</section>
