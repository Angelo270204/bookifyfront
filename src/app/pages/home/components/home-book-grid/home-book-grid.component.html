<section class="grid-block" id="colecciones">
  <div class="section-head">
    <h2>Colecciones recomendadas</h2>
    <a href="#nuevos">Ver novedades</a>
  </div>

  <div class="book-grid">
    @for (book of books; track book.id) {
      <article class="book-card">
        <div class="thumb" [style.backgroundImage]="'url(' + getCoverUrl(book) + ')'" aria-hidden="true"></div>
        <p class="category">{{ book.categoria?.nombre || 'Sin categoría' }}</p>
        <h3>{{ book.titulo }}</h3>
        <p class="author">{{ book.autor?.nombre || 'Desconocido' }}</p>
      </article>
    }
  </div>
</section>
