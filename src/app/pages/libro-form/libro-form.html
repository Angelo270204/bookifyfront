<div style="padding: 20px; background-color: #f9f9f9; border: 1px solid #ddd; margin: 20px; font-family: Arial, sans-serif;">
  <h3 style="margin-top: 0; color: #333;">Añadir Nuevo Libro</h3>
  
  <form (ngSubmit)="guardar()">
    <div style="margin-bottom: 10px;">
      <label style="display: block; font-weight: bold;">Título: </label>
      <input type="text" name="titulo" [(ngModel)]="nuevoLibro.titulo" required style="width: 100%; padding: 6px; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 10px;">
      <label style="display: block; font-weight: bold;">Descripción: </label>
      <input type="text" name="descripcion" [(ngModel)]="nuevoLibro.descripcion" required style="width: 100%; padding: 6px; box-sizing: border-box;">
    </div>
    
    <div style="margin-bottom: 10px;">
      <label style="display: block; font-weight: bold;">Precio: </label>
      <input type="number" name="precio" [(ngModel)]="nuevoLibro.precio" required style="width: 100%; padding: 6px; box-sizing: border-box;">
    </div>
    
    <div style="margin-bottom: 10px;">
      <label style="display: block; font-weight: bold;">Formato: </label>
      <input type="text" name="formato" [(ngModel)]="nuevoLibro.formato" required style="width: 100%; padding: 6px; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 10px;">
      <label style="display: block; font-weight: bold;">URL de Portada (Opcional): </label>
      <input type="text" name="portadaUrl" [(ngModel)]="nuevoLibro.portadaUrl" style="width: 100%; padding: 6px; box-sizing: border-box;">
    </div>
    
    <div style="margin-bottom: 15px;">
      <label style="display: block; font-weight: bold;">Autor: </label>
      <select name="autorId" [(ngModel)]="nuevoLibro.autorId" required style="width: 100%; padding: 6px; box-sizing: border-box;">
        <option [ngValue]="null" disabled>Selecciona un autor...</option>
        <option *ngFor="let autor of autores" [value]="autor.id">
          {{ autor.nombre }}
        </option>
      </select>
    </div>
    
    <div style="margin-bottom: 20px;">
      <label style="display: block; font-weight: bold;">Categoría: </label>
      <select name="categoriaId" [(ngModel)]="nuevoLibro.categoriaId" required style="width: 100%; padding: 6px; box-sizing: border-box;">
        <option [ngValue]="null" disabled>Selecciona una categoría...</option>
        <option *ngFor="let cat of categorias" [value]="cat.id">
          {{ cat.nombre }}
        </option>
      </select>
    </div>
    
    <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px;">
      Guardar Libro
    </button>
  </form>
</div>
