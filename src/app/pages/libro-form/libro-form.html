<div class="form-card">
  <h3 class="form-title">Añadir Nuevo Libro</h3>

  <form class="book-form" (ngSubmit)="guardar()">
    <div class="form-grid">
      <div class="field">
        <label for="titulo">Título</label>
        <input id="titulo" type="text" name="titulo" [(ngModel)]="nuevoLibro.titulo" placeholder="Ej: El Quijote" required>
      </div>

      <div class="field">
        <label for="formato">Formato</label>
        <input id="formato" type="text" name="formato" [(ngModel)]="nuevoLibro.formato" placeholder="Ej: Digital, Físico">
      </div>

      <div class="field">
        <label for="precio">Precio ($)</label>
        <input id="precio" type="number" name="precio" [(ngModel)]="nuevoLibro.precio" placeholder="0.00" required min="0">
      </div>

      <div class="field">
        <label for="portadaUrl">URL de Portada <span class="optional">(Opcional)</span></label>
        <input id="portadaUrl" type="text" name="portadaUrl" [(ngModel)]="nuevoLibro.portadaUrl" placeholder="https://...">
      </div>

      <div class="field full-width">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" [(ngModel)]="nuevoLibro.descripcion" rows="3" placeholder="Breve descripción del libro..."></textarea>
      </div>

      <div class="field">
        <label for="autorId">Autor</label>
        <select id="autorId" name="autorId" [(ngModel)]="nuevoLibro.autorId" required>
          <option [ngValue]="null" disabled>Selecciona un autor...</option>
          <option *ngFor="let autor of autores" [value]="autor.id">{{ autor.nombre }}</option>
        </select>
      </div>

      <div class="field">
        <label for="categoriaId">Categoría</label>
        <select id="categoriaId" name="categoriaId" [(ngModel)]="nuevoLibro.categoriaId" required>
          <option [ngValue]="null" disabled>Selecciona una categoría...</option>
          <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nombre }}</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-save">💾 Guardar Libro</button>
    </div>
  </form>
</div>
