<div class="form-card">
  <h3 class="form-title">Añadir Nuevo Libro</h3>

  <form class="book-form" (ngSubmit)="guardar()">
    <div class="form-grid">
      <div class="field">
        <label for="titulo">Título</label>
        <input id="titulo" type="text" name="titulo" [(ngModel)]="nuevoLibro.titulo" placeholder="Ej: El Quijote" required>
      </div>

      <div class="field">
        <label for="formato">Formato</label>
        <select id="formato" name="formato" [(ngModel)]="nuevoLibro.formato">
          <option value="" disabled>Selecciona un formato</option>
          <option value="FISICO">Físico</option>
          <option value="DIGITAL">Digital</option>
        </select>
      </div>

      <div class="field">
        <label for="precio">Precio ($)</label>
        <input id="precio" type="number" name="precio" [(ngModel)]="nuevoLibro.precio" placeholder="0.00" required min="0">
      </div>

      <!-- Zona de carga de portada (reemplaza el input de texto) -->
      <div class="field">
        <label>Portada <span class="optional">(Opcional · Máx. 2MB)</span></label>
        <input
          #inputPortada
          type="file"
          accept="image/jpeg,image/png,image/webp"
          style="display:none"
          (change)="onPortadaSeleccionada($event)"
        >

        <div class="portada-uploader" (click)="abrirSelectorPortada()">

          <!-- Estado: Con previsualización -->
          <div class="portada-preview-wrap" *ngIf="previewPortadaUrl && !subiendoPortada">
            <img [src]="previewPortadaUrl" alt="Previsualización de portada" class="portada-preview-img">
            <div class="portada-overlay">
              <span>🔄 Cambiar</span>
            </div>
          </div>

          <!-- Estado: Subiendo -->
          <div class="portada-cargando" *ngIf="subiendoPortada">
            <div class="spinner"></div>
            <p>Subiendo imagen...</p>
          </div>

          <!-- Estado: Vacío -->
          <div class="portada-vacia" *ngIf="!previewPortadaUrl && !subiendoPortada">
            <span class="portada-icono">🖼️</span>
            <p>Clic para subir portada</p>
          </div>

        </div>

        <p class="error-portada" *ngIf="errorPortada">{{ errorPortada }}</p>
      </div>

      <div class="field full-width">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" [(ngModel)]="nuevoLibro.descripcion" rows="3" placeholder="Breve descripción del libro..."></textarea>
      </div>

      <div class="field">
        <label for="autorId">Autor</label>
        <select id="autorId" name="autorId" [(ngModel)]="nuevoLibro.autorId" required>
          <option [ngValue]="null" disabled>Selecciona un autor...</option>
          <option *ngFor="let autor of autores" [value]="autor.id">{{ autor.nombre }}</option>
        </select>
      </div>

      <div class="field">
        <label for="categoriaId">Categoría</label>
        <select id="categoriaId" name="categoriaId" [(ngModel)]="nuevoLibro.categoriaId" required>
          <option [ngValue]="null" disabled>Selecciona una categoría...</option>
          <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nombre }}</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <!-- Botón de cancelar -->
      <button type="button" class="btn-cancel" (click)="cancelar()" [disabled]="subiendoPortada">
        ❌ Cancelar
      </button>

      <button type="submit" class="btn-save" [disabled]="subiendoPortada">
        <span *ngIf="!subiendoPortada">💾 Guardar Libro</span>
        <span *ngIf="subiendoPortada">⏳ Subiendo portada...</span>
      </button>
    </div>
  </form>
</div>
