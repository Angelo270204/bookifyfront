<div style="padding: 20px;">
  <h2>Registro de Libros</h2>
  
  <table border="1" style="width: 100%; text-align: left; border-collapse: collapse;">
    <thead>
      <tr style="background-color: #f2f2f2;">
        <th>ID</th>
        <th>Título</th>
        <th>Formato</th>
        <th>Precio</th>
        <th>Autor</th>
        <th>Categoría</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let libro of libros">
        <td>{{ libro.id }}</td>
        <td>{{ libro.titulo }}</td>
        <td>{{ libro.formato }}</td>
        <td>{{ libro.precio }}</td>
        <td>{{ libro.autor?.nombre }}</td>
        <td>{{ libro.categoria?.nombre }}</td>
      </tr>
      <tr *ngIf="libros.length === 0">
        <td colspan="6" style="text-align: center;">No hay libros registrados o el backend está apagado.</td>
      </tr>
    </tbody>
  </table>
</div>
